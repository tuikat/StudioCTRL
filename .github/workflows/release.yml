name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One package per platform: macOS universal .dmg, Linux .AppImage, Windows .exe
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            patchelf libayatana-appindicator3-dev

      - name: Install frontend dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name || inputs.tag }}
          releaseName: "StudioCTRL ${{ github.ref_name || inputs.tag }}"
          releaseBody: |
            ## StudioCTRL ${{ github.ref_name || inputs.tag }}

            Desktop controller for Blackmagic Micro Studio Camera 4K G2 (and other Blackmagic cameras with the Camera Control REST API).

            ### Downloads (one package per platform)
            - **Windows**: `.exe` installer (NSIS)
            - **macOS**: universal `.dmg` (Apple Silicon and Intel in one)
            - **Linux**: `.AppImage`

            > macOS/Windows builds are unsigned; you may need to bypass Gatekeeper/SmartScreen on first launch.

            See [README](https://github.com/tuikat/StudioCTRL#readme) for setup.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
